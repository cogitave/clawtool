# managed-by: clawtool
# Generated by `clawtool recipe apply golangci-lint`.
# Edits are safe — re-running the recipe refuses to overwrite an
# unmanaged file. Remove the `managed-by: clawtool` line above to
# make this file fully your own.
#
# golangci-lint v2 config — conservative defaults that pass on most
# Go repos out of the box. Tune `linters` as your codebase matures.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - revive

formatters:
  enable:
    - gofmt
    - goimports
