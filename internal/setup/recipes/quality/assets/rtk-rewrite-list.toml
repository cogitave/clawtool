# managed-by: clawtool
# Generated by `clawtool recipe apply rtk-token-filter`.
# Edits are safe — re-running the recipe refuses to overwrite an
# unmanaged file. Remove the `managed-by: clawtool` line above to
# make this file fully your own.
#
# rtk token-filter rewrite list — names every Bash command name
# whose output is safe to pipe through `rtk`
# (https://github.com/rtk-ai/rtk, Apache-2.0). When the rules-engine
# pre_tool_use rewrite rule fires for a Bash invocation, it checks
# the first whitespace-delimited token against `commands` below; on
# match (and only when `rtk` is on PATH) it prepends `rtk ` to the
# argv so the proxy compresses the output before it lands in the
# agent's context.
#
# Reported savings on common dev commands: 60-90% on `git status`,
# `ls -R`, `grep`, etc. Numbers are upstream-reported; your mileage
# will track repo size and command volume.
#
# Schema (v1):
#   description — one line, what this list covers
#   commands    — string array, command names to rewrite (no paths,
#                 no flags — match is on the first whitespace token
#                 only)
#
# Add a command name to extend coverage. Anything missing here is
# dispatched unchanged. The default list intentionally excludes
# stream-producing or interactive commands (curl, docker, ssh) so
# the proxy never breaks a pty-driven flow.

description = "rtk-rewrite allowlist — Bash commands whose output is safe to compress via the rtk CLI proxy."

commands = [
  "git",
  "ls",
  "grep",
  "cat",
  "head",
  "tail",
  "find",
  "tree",
  "diff",
  "stat",
  "wc",
  "awk",
  "sed",
]
