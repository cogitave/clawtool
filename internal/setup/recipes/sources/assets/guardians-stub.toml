# managed-by: clawtool
# Generated by `clawtool recipe apply guardians-stub`.
# Edits are safe — re-running the recipe refuses to overwrite an
# unmanaged file. Remove the `managed-by: clawtool` line above to
# make this file fully your own.
#
# Guardians (https://github.com/metareflection/guardians, MIT) is a
# reference implementation of Erik Meijer's "Guardians of the
# Agents: Formal Verification of AI Workflows" (CACM, January 2026):
# taint-tracking + Z3-SAT pre-send verification of an agent's
# drafted plan.
#
# clawtool's rule engine (internal/rules) registers a
# `guardians_check(plan_arg)` predicate. Today (phase 1) the
# predicate is a stub that ALWAYS returns true — operators can
# wire the rule shape into pre_send today and have the verdict
# flip to a real Z3-SAT result once phase 2 lands the engine
# behind a build tag. No Z3 dependency is pulled in until then.
#
# Phase-2 contract (preview): the predicate will read
# `Context.Args["<plan_arg>"]`, run a taint propagation pass over
# the plan's tool-call graph, encode the operator-defined safety
# invariants (defined alongside this template in a future
# `guardians.invariants.smt2` file) as Z3 assertions, and return
# (false, "<unsat-core summary>") when the solver returns UNSAT.
#
# Until phase 2 ships, the rule below evaluates to "passed" for
# every pre_send. Drop it now so your routing policy is in place.

[[rule]]
name = "guardians-presend"
when = "pre_send"
# Rule semantics in clawtool: the condition expression evaluates
# to TRUE iff the rule should PASS. So the natural shape here is
# `guardians_check(plan_arg)` — phase-2 returns true when the
# plan is safe, false (with the UNSAT core in `why`) otherwise.
# Phase-1 stub returns true unconditionally, so this rule passes
# silently for every pre_send today. The severity is "warn"
# today (not "block") so the first phase-2 deployments get a
# soft-launch — operators see the diagnostic before the rule
# starts hard-blocking dispatches.
condition = 'guardians_check("plan")'
severity = "warn"
hint = "Guardians UNSAT — drafted plan violates a taint-flow invariant. See https://github.com/metareflection/guardians for the engine. Phase-1 stub never fires."
description = "Pre-send taint+Z3 verification of the drafted plan (phase-1 stub: always passes; phase-2 wires the real engine)."
