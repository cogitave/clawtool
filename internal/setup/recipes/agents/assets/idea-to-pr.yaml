# Reference: https://archon.diy/guides/authoring-workflows/
# Schema: the v2 DAG-workflow shape used by .archon/workflows/*.yaml
# (name + description + nodes[id, prompt|bash|loop|command,
# depends_on]). See internal/playbooks/archon_loader.go for the
# subset clawtool currently understands.

name: idea-to-pr
description: |
  Take a feature idea, plan it, implement it in a loop until tests
  pass, and prepare a PR. Demonstrates each Archon node kind that
  clawtool's phase-1 loader recognises:
    - prompt:  AI step
    - bash:    deterministic shell step
    - loop:    AI loop with an until-clause + iteration cap

nodes:
  - id: plan
    prompt: |
      Explore the codebase and produce an implementation plan
      for the feature described in $USER_MESSAGE. Save the plan
      to .archon/plans/idea-to-pr.md.

  - id: implement
    depends_on: [plan]
    loop:
      prompt: |
        Read .archon/plans/idea-to-pr.md. Implement the next
        unchecked task. Run validation. Mark the task done.
        Output <promise>COMPLETE</promise> when every task is
        checked off.
      until: COMPLETE
      max_iterations: 8
      fresh_context: true

  - id: validate
    depends_on: [implement]
    bash: |
      go test ./... && echo "validation: PASS"

  - id: review
    depends_on: [validate]
    prompt: |
      Review the diff against .archon/plans/idea-to-pr.md.
      Flag any scope creep or missing tests, then summarise
      the change in two paragraphs suitable for a PR body.
