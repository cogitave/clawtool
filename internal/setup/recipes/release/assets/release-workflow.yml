# managed-by: clawtool
# Generated by `clawtool recipe apply goreleaser`.
# Tag-triggered: a tag matching v*.*.* (release-please cuts these
# when its release PR is merged) runs GoReleaser and publishes a
# GitHub Release with cross-platform binaries + checksums.

name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
