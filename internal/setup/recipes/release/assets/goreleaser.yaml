# managed-by: clawtool
# Generated by `clawtool recipe apply goreleaser`.
# Edits here are safe — re-running the recipe refuses to overwrite an
# unmanaged file. Remove the `managed-by: clawtool` line above to
# make this file fully your own.
#
# GoReleaser v2 config — minimal happy-path defaults. Tweak `builds`
# to match your project (entry point, ldflags, GOOS/GOARCH matrix).

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    binary: "{{ .ProjectName }}"
    main: ./
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"
