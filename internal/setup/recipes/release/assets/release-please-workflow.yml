# managed-by: clawtool
# Generated by `clawtool recipe apply release-please`.
# Edits here are safe — re-running the recipe refuses to overwrite
# an unmanaged file. Remove the `managed-by: clawtool` line above
# to make this file fully your own.
#
# release-please opens (and updates) a release PR per Conventional
# Commits commit landed on `main`. Merging the PR cuts a tag.

name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
