# managed-by: clawtool
# Generated by `clawtool recipe apply lefthook`.
# Edits here are safe — re-running the recipe refuses to overwrite
# an unmanaged file.
#
# Lefthook is a polyglot Git-hook manager (Go binary, no Node deps).
# Pairs with the commitlint config to reject bad subject lines BEFORE
# they reach CI — closes the release-please loop locally.

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}
      # If commitlint isn't installed locally yet, this skips
      # gracefully — the CI's commit-format job is the backstop.

pre-commit:
  parallel: true
  commands:
    # Add per-language linters here as recipes ship them. The
    # lefthook recipe is the wiring; clawtool's quality recipes
    # populate this section.
    placeholder:
      run: "true"
