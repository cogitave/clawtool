name: Integration

# Multi-instance soak against real upstream MCP servers (catalog entries:
# memory, sequentialthinking, filesystem). Slow (npm install per upstream
# on cache miss) and network-dependent — kept off the CI critical path.
#
# Triggers:
#   - Daily at 04:00 UTC (cron) so green-streak shows in the README badge.
#   - Manual via Actions UI (workflow_dispatch).
#   - PR with the 'integration' label, so contributors can opt in when
#     their change touches source/proxy code.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "22"

# Avoid stacking nightly runs.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  soak:
    name: Multi-instance soak
    runs-on: ubuntu-latest
    # Skip pull_request runs unless the 'integration' label is on.
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          # `cache: npm` requires a package-lock.json at repo root — clawtool
          # is a Go project so there isn't one. npx packages download per run;
          # this job is scheduled daily so the cache miss is tolerable.

      # Manually cache ~/.npm so npx download-on-demand isn't wholly cold
      # across runs. Hashing on go.sum is a stable-enough key — it changes
      # roughly when the integration set turns over too.
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build clawtool
        run: make build

      - name: Run multi-instance soak
        run: make integration

      # Fail loud so flaky network days are easy to spot in the badge.
      - name: Summary
        if: always()
        run: |
          echo "## Multi-instance soak" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$JOB_STATUS" = "success" ]; then
            echo "✅ Verified against memory + sequentialthinking + filesystem." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ See logs — usually network or upstream API change." >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          JOB_STATUS: ${{ job.status }}
