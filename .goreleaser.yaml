# GoReleaser configuration for clawtool.
#
# Triggered by a tag push matching v[0-9]+.[0-9]+.[0-9]+ (see
# .github/workflows/release.yml). Produces:
#   - Cross-compiled binaries for linux + darwin (amd64 + arm64)
#   - tar.gz archives with README + LICENSE + the binary
#   - SHA-256 checksums file
#   - GitHub Release with notes from git-cliff (--latest)
#
# We deliberately exclude Windows from the v0.8.x release line — the Bash
# tool's process-group SIGKILL is unix-only, and we'd rather not ship an
# advertised Windows binary that fails the timeout-safety quality bar
# (ADR-005). Re-enable once the Windows job-object code path lands.

version: 2

project_name: clawtool

before:
  hooks:
    - go mod download
    - go mod tidy

builds:
  - id: clawtool
    main: ./cmd/clawtool
    binary: clawtool
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/cogitave/clawtool/internal/version.Version={{ .Version }}

archives:
  - id: default
    # Naming convention matches creativeprojects/go-selfupdate's
    # default DetectLatest pattern so `clawtool upgrade` (which
    # uses that library) can find the right asset for the host's
    # GOOS/GOARCH. Previous versions emitted `x86_64` for amd64
    # via a manual mapping; go-selfupdate looks for `amd64`
    # verbatim, so the upgrade path silently 404'd. Keep the
    # GOARCH name as-is.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats: ["tar.gz"]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

# Release notes are produced by git-cliff in the release workflow and
# passed via --release-notes; GoReleaser's own changelog generator is
# disabled to avoid duplication.
changelog:
  disable: true

release:
  github:
    owner: cogitave
    name: clawtool
  draft: false
  prerelease: auto
  # release.header / release.footer / release.mode all REMOVED 2026-05-01.
  # The rich self-hosted release-notes script (scripts/release-notes-rich.sh)
  # now produces the COMPLETE body — dynamic per-tag header derived from
  # the highest-impact commit, grouped commit list with scope emojis, the
  # install snippet, and stats. Goreleaser passes that entire markdown
  # blob through `--release-notes=BODY.md` unchanged.
  #
  # The previous templates duplicated content the script emits AND
  # leaked an internal ADR reference (ADR-009) into user-facing UX,
  # which violates the project's "no internal doc IDs in UX" rule.
  # Single source of truth now lives in the script.
