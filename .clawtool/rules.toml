# clawtool rules — predicate-based invariants enforced at
# lifecycle events (pre_commit, post_edit, session_end,
# pre_send, pre_unattended). See docs/rules.md for the schema.

[[rule]]
name      = "no-internal-doc-ids"
description = "User-facing surfaces must not leak internal doc IDs (ADR-XXX, audit-#NNN, ticket slugs)."
when      = "post_edit"
condition = "changed(\"internal/cli/**/*.go\") OR changed(\"commands/*.md\") OR changed(\"internal/tools/core/*.go\") OR changed(\"README.md\") OR changed(\"skills/clawtool/SKILL.md\")"
severity  = "warn"
hint      = "Grep the touched files for ADR-, audit-#, and bare #\\d+ references. Move internal references to source comments or wiki cross-links; describe behavior plainly in CLI help, slash commands, MCP tool descriptions, onboard prompts, README operator sections, and config templates. Operator caught ADR-029 leaking into onboard / overview / doctor / commands/clawtool-overview.md and called it bad UX."

[[rule]]
name      = "gofmt-clean"
description = "Go sources must be gofmt-clean before commit. CI Lint job will fail otherwise."
when      = "pre_commit"
condition = "changed(\"**/*.go\")"
severity  = "warn"
hint      = "Run: gofmt -l . to find diverged files; gofmt -w <file> to fix in-place. Apply across the whole repo: find . -name \"*.go\" -not -path \"./vendor/*\" -exec gofmt -w {} +"

[[rule]]
name      = "race-clean"
description = "Go tests must pass under -race before commit. CI Test job runs go test -race and will fail otherwise."
when      = "pre_commit"
condition = "changed(\"**/*.go\")"
severity  = "warn"
hint      = "Run: go test -race -count=1 -timeout=120s ./... — fix any DATA RACE warnings (usually shared variables across test goroutines; reorder so the writer settles before the reader spawns, or use a channel)."

[[rule]]
name      = "no-autodev-private-files"
description = "Prevent committing private autodev artifacts (cron tick logs, operator prompts, conversation dumps). The .autodev-notes.md leak on 2026-05-02 shipped operator prompts to GitHub via 138 tags before history rewrite."
when      = "pre_commit"
condition = "staged(\".autodev-notes.md\") OR staged(\".autodev/**\") OR staged(\"autodev-notes.md\") OR staged(\"**/operator-prompts.md\") OR staged(\"**/.claude/agents/*-private.md\") OR staged(\"**/conversation-log-*.md\") OR staged(\"**/chat-history.md\") OR staged(\".clawtool/private/**\")"
severity  = "block"
hint      = "Path matches an autodev-internal pattern. These files contain operator prompts, tick logs, or chat history and MUST NOT enter git. Add the path to .gitignore or move to ~/.config/clawtool/private-backups/. Reference incident: 2026-05-02 .autodev-notes.md history rewrite."

[[rule]]
name      = "no-credentials-in-staged"
description = "Block commit when staged files contain anything that smells like a secret (API keys, tokens, JWT, private keys, env files with values)."
when      = "pre_commit"
condition = "staged(\"**/*.env\") OR staged(\"**/.env.*\") OR staged(\"**/*.pem\") OR staged(\"**/*.key\") OR staged(\"**/secrets.toml\") OR staged(\"**/credentials.json\") OR staged(\"**/.aws/credentials\") OR staged(\"**/id_rsa\") OR staged(\"**/id_ed25519\")"
severity  = "block"
hint      = "Staged file matches a known-credential filename pattern. Even if the content is safe today, the path schema is risky. Move to ~/.config/clawtool/secrets.toml (already gitignored) or use environment variables. If this is a sample/template, name it `*.example` or `*.template` instead."

[[rule]]
name      = "gitignore-internal-paths"
description = "Verify .gitignore covers known-private path patterns. Catches the case where a fresh patterns slips in without ignore coverage."
when      = "post_edit"
condition = "changed(\".clawtool/rules.toml\") OR changed(\".gitignore\")"
severity  = "warn"
hint      = "After updating private-pattern rules, ensure .gitignore has matching entries. Currently covered: .autodev-notes.md, autodev-notes.md, .autodev/, /wiki/, /playbooks/_personal/*, /BODY.md, /.obsidian/, .obsidian/workspace.json. If you added a new pattern to no-autodev-private-files or no-credentials-in-staged rules, mirror it in .gitignore so the file never even reaches the index."

[[rule]]
name      = "version-manifests-in-sync"
description = "When internal/version/version.go's Version const changes, the .claude-plugin manifests must be regenerated from it."
when      = "pre_commit"
condition = "changed(\"internal/version/version.go\") OR changed(\".claude-plugin/plugin.json\") OR changed(\".claude-plugin/marketplace.json\")"
severity  = "warn"
hint      = "internal/version.Version is the single source of truth for the release tag. Run: make sync-versions (or `go generate ./internal/version/...`) — that rewrites .claude-plugin/plugin.json + .claude-plugin/marketplace.json from the const and only touches the version line(s). CI runs `make sync-versions-check` which fails if drift exists, and TestReleasePipeline_VersionsAreCodegenSynced asserts byte-identical manifests on every test run."

[[rule]]
name      = "docsync-pair"
description = "Doc-sync invariant: when a *.go file changes AND its sibling *.md doc exists on disk, the .md must land in the same commit. Reuses rules.Severity verbatim per ADR-022 §Resolved (off / warn / block); flip severity to 'warn' or 'block' to enable. The docsync_violation() predicate is pre-computed by internal/checkpoint.CheckDocsync (test/codegen-aware filter) before rules.Evaluate runs."
when      = "pre_commit"
condition = "not docsync_violation(\"go\")"
severity  = "off"
hint      = "A staged *.go file has a sibling *.md on disk that wasn't restaged. Either edit the doc to reflect the code change, or `git add` the existing doc to confirm the pairing. Convention: <dir>/foo.go ↔ <dir>/foo.md. _test.go and well-known codegen suffixes (*.pb.go, *_gen.go, zz_generated_*) are exempt."

[[rule]]
name      = "no-version-version-outside-version-pkg"
description = "Hardcoded clawtool version strings (literal semvers like 0.22.x) outside internal/version/ are an anti-pattern."
when      = "post_edit"
condition = "changed(\"**/*.go\") OR changed(\"**/*.json\") OR changed(\"**/*.yaml\") OR changed(\"**/*.yml\") OR changed(\"**/*.sh\") OR changed(\"**/*.md\")"
severity  = "warn"
hint      = "internal/version.Version is canonical. .claude-plugin/plugin.json + marketplace.json are generated from it (cmd/version-sync). Any other file that bakes a clawtool semver is a future drift source — call version.Resolved() at runtime, or accept that release-please bumps will leave the literal stale. Test fixtures with explicit versions are fine; user-facing docs / install scripts / Dockerfiles should source the version dynamically (e.g. install.sh hits the GitHub releases API)."